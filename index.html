<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Breathless with Lyrics</title>
</head>
<body>
  <div class="player-wrap">
    <div class="video-crop">
      <video id="songVideo" width="640" height="480" controls playsinline webkit-playsinline preload="metadata">
        <source src="assets/breathless_ios.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    </div>
    <button id="startAudioBtn" type="button">Tap to Play with Sound</button>
  </div>

  <script>
    const video = document.getElementById('songVideo');
    const startButton = document.getElementById('startAudioBtn');

    async function startWithSound() {
      video.muted = false;
      video.volume = 1;

      try {
        await video.play();
        startButton.style.display = 'none';
      } catch (error) {
        startButton.textContent = 'Tap again to allow audio';
      }
    }

    startButton.addEventListener('click', startWithSound);
  </script>
</body>
</html>
